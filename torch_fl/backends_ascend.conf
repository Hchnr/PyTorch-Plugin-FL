# flagos op backend config for Ascend
# Format: op_name = backend
# backend: flaggems | ascend
# Default (unlisted ops): flaggems (will CPU-fallback if FlagGems is disabled)
#
# Usage: FLAGOS_BACKEND_CONFIG=torch_fl/backends_ascend.conf
#
# Only ops with a registered Ascend kernel (csrc/aten/backends/ascend/) can use "ascend".
# Others will use the default (flaggems) or CPU fallback.

mm = ascend
mm.out = ascend
