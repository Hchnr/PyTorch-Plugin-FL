# flagos op backend config for Ascend NPU
# Format: op_name = backend
# backend: flaggems | npu
# Default (unlisted ops): flaggems (will CPU-fallback if FlagGems is disabled)
#
# Usage: FLAGOS_BACKEND_CONFIG=torch_fl/backends_npu.conf
#
# Only ops with a registered NPU kernel (csrc/aten/backends/npu/) can use "npu".
# Others will use the default (flaggems) or CPU fallback.

mm = npu
mm.out = npu
